name: Full Ingest (All Sources)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Ingest mode"
        required: true
        default: "backfill"
        type: choice
        options:
          - backfill
          - recent
          - custom
      hours:
        description: "Lookback hours (only for custom mode)"
        required: false
        default: "12"
        type: choice
        options:
          - "6"
          - "12"
          - "24"
          - "72"
          - "168"
          - "336"
          - "720"
          - "1440"

jobs:
  ingest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: adprism-ingest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: adprism-ingest/requirements.txt

      - run: pip install -r requirements.txt

      - name: Run full ingest
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          GEMINI_API_KEY_4: ${{ secrets.GEMINI_API_KEY_4 }}
        run: |
          MODE="${{ github.event.inputs.mode }}"
          HOURS="${{ github.event.inputs.hours }}"

          ARGS=""

          if [ "$MODE" = "recent" ]; then
            ARGS="--recent"
          elif [ "$MODE" = "backfill" ]; then
            ARGS="--backfill"
          elif [ "$MODE" = "custom" ]; then
            ARGS="--hours $HOURS --no-dedup"
          fi

          echo "Running: python src/main.py $ARGS"
          python src/main.py $ARGS
