name: Test Ingest (One-Off)

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Brand/source name to test"
        required: true
        type: string
      hours:
        description: "Lookback hours"
        required: false
        default: "6"
        type: choice
        options:
          - "6"
          - "12"
          - "24"
          - "72"
          - "168"

jobs:
  ingest-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: adprism-ingest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: adprism-ingest/requirements.txt

      - run: pip install -r requirements.txt

      - name: Run test ingest
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          GEMINI_API_KEY_4: ${{ secrets.GEMINI_API_KEY_4 }}
        run: |
          SOURCE="${{ github.event.inputs.source }}"
          HOURS="${{ github.event.inputs.hours }}"

          echo "Running: python src/main.py --hours $HOURS --no-dedup --source $SOURCE"
          python src/main.py --hours "$HOURS" --no-dedup --source "$SOURCE"
